services:
  web:
    build: .
    # Chromium (Playwright) needs more than Docker's default 64MB /dev/shm or it
    # crashes ("double free or corruption"), which hangs content extraction.
    shm_size: 1gb
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - DATA_DIR=/data
      - SCORER_BACKEND=local
      - LLM_BASE_URL=http://172.17.0.1:11234/v1
      - SKIP_BROWSER_LOGIN=1
    volumes:
      - app-data:/data
    restart: unless-stopped

  scheduler:
    build: .
    # See web service: Chromium needs a larger /dev/shm to avoid crashing.
    shm_size: 1gb
    command: ["uv", "run", "python", "scripts/run_weekly.py", "--schedule"]
    env_file: .env
    environment:
      - DATA_DIR=/data
      - SCORER_BACKEND=local
      - LLM_BASE_URL=http://172.17.0.1:11234/v1
      - SKIP_BROWSER_LOGIN=1
    volumes:
      - app-data:/data
    restart: unless-stopped

volumes:
  app-data:
